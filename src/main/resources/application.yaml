spring:
  application:
    name: gongchae-coming
  config:
    import: optional:file:.env[.properties]
  datasource:
    url: jdbc:h2:mem:gongchae;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
    defer-datasource-initialization: true
  thymeleaf:
    cache: false

server:
  port: 8080

logging:
  level:
    org.hibernate.SQL: debug

app:
  web-base-url: ${APP_WEB_BASE_URL:http://localhost:8080}
  alio:
    base-url: https://apis.data.go.kr/1051000/recruitment
    recruit-list-path: /list
    public-inst-list-url: https://apis.data.go.kr/1051000/public_inst/list
    service-key: ${API_KEY:}
    result-type: json
  recruitment:
    default-page-size: 10
    max-page-size: 50
