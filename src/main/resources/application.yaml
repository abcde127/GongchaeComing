spring:
  application:
    name: gongchae-coming
  config:
    import: optional:file:.env[.properties]
  datasource:
    url: ${DATABASE_URL:jdbc:h2:file:./gongchae;MODE=MySQL;DB_CLOSE_DELAY=-1;AUTO_SERVER=TRUE}
    driver-class-name: org.h2.Driver
    username: ${DATABASE_USERNAME:sa}
    password: ${DATABASE_PASSWORD:}
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
    defer-datasource-initialization: true
  thymeleaf:
    cache: false
  mail:
    host: ${MAIL_HOST:smtp.naver.com}
    port: ${MAIL_PORT:465}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        debug: true
        smtp:
          auth: ${MAIL_SMTP_AUTH:true}
          ssl:
            enable: ${MAIL_SMTP_SSL_ENABLE:true}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS_ENABLE:false}

server:
  port: 8080

logging:
  level:
    org.hibernate.SQL: debug

app:
  web-base-url: ${APP_WEB_BASE_URL:http://localhost:8080}
  mail:
    enabled: ${APP_MAIL_ENABLED:true}
    from: ${APP_MAIL_FROM:${MAIL_USERNAME}}
  alio:
    base-url: https://apis.data.go.kr/1051000/recruitment
    recruit-list-path: /list
    public-inst-list-url: https://apis.data.go.kr/1051000/public_inst/list
    service-key: ${API_KEY:}
    result-type: json
    recruitment-seed-location: file:src/main/resources/seed/alio-recruitments.json
    recruitment-seed-output-path: src/main/resources/seed/alio-recruitments.json
  recruitment:
    default-page-size: 10
    max-page-size: 50
