<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>회원가입 | 공채왔어요</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800&display=swap" rel="stylesheet">
	<link rel="stylesheet" th:href="@{/css/auth.css}">
</head>
<body>
<header class="service-topbar">
	<a class="service-brand" href="/">
		<span class="brand-mark">G</span>
		<span>공채왔어요</span>
	</a>
	<nav class="service-topnav" aria-label="회원가입 상단 메뉴">
		<a href="/recruitments">공고 목록</a>
	</nav>
</header>
<main class="auth-page signup-page">
	<section class="auth-panel" aria-labelledby="signup-title">
		<div class="auth-card">
			<div class="auth-heading">
				<p class="eyebrow">Create account</p>
				<h2 id="signup-title">회원가입</h2>
			</div>

			<div class="alert" id="signupMessage" role="alert" aria-live="polite" hidden></div>

			<form class="auth-form" id="signupForm" novalidate>
				<div class="field-group">
					<label for="email">이메일</label>
					<div class="input-action-row">
						<input
							type="email"
							id="email"
							name="email"
							autocomplete="email"
							placeholder="you@example.com"
							maxlength="100"
							required>
						<button type="button" class="secondary-button" id="checkEmailButton">중복 확인</button>
					</div>
					<p class="field-error" id="emailError"></p>
				</div>

				<div class="field-group">
					<label for="nickname">닉네임</label>
					<input
						type="text"
						id="nickname"
						name="nickname"
						autocomplete="nickname"
						placeholder="2자 이상 입력"
						minlength="2"
						maxlength="50"
						required>
					<p class="field-error" id="nicknameError"></p>
				</div>

				<div class="field-group">
					<label for="password">비밀번호</label>
					<div class="password-field">
						<input
							type="password"
							id="password"
							name="password"
							autocomplete="new-password"
							placeholder="영문과 숫자 포함 8자 이상"
							minlength="8"
							maxlength="64"
							required>
						<button
							type="button"
							class="text-button password-toggle"
							id="togglePassword"
							aria-label="비밀번호 표시"
							aria-pressed="false">
							<span class="password-toggle-icon" data-visible="false" aria-hidden="true">
								<svg viewBox="0 0 24 24" focusable="false">
									<path d="m3 3 18 18"></path>
									<path d="M10.7 5.2A10.7 10.7 0 0 1 12 5c6.5 0 10 7 10 7a18 18 0 0 1-3.2 4.1"></path>
									<path d="M14.1 14.1A3 3 0 0 1 9.9 9.9"></path>
									<path d="M6.6 6.6A18.2 18.2 0 0 0 2 12s3.5 7 10 7a10.8 10.8 0 0 0 4.4-.9"></path>
								</svg>
							</span>
							<span class="password-toggle-icon" data-visible="true" aria-hidden="true" hidden>
								<svg viewBox="0 0 24 24" focusable="false">
									<path d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6S2 12 2 12Z"></path>
									<circle cx="12" cy="12" r="3"></circle>
								</svg>
							</span>
						</button>
					</div>
					<p class="field-hint">영문과 숫자를 포함해 8자 이상 입력해주세요.</p>
					<p class="field-error" id="passwordError"></p>
				</div>

				<div class="field-group">
					<label for="passwordConfirm">비밀번호 확인</label>
					<div class="password-field">
						<input
							type="password"
							id="passwordConfirm"
							name="passwordConfirm"
							autocomplete="new-password"
							placeholder="비밀번호를 한 번 더 입력"
							required>
						<button
							type="button"
							class="text-button password-toggle"
							id="togglePasswordConfirm"
							aria-label="비밀번호 확인 표시"
							aria-pressed="false">
							<span class="password-toggle-icon" data-visible="false" aria-hidden="true">
								<svg viewBox="0 0 24 24" focusable="false">
									<path d="m3 3 18 18"></path>
									<path d="M10.7 5.2A10.7 10.7 0 0 1 12 5c6.5 0 10 7 10 7a18 18 0 0 1-3.2 4.1"></path>
									<path d="M14.1 14.1A3 3 0 0 1 9.9 9.9"></path>
									<path d="M6.6 6.6A18.2 18.2 0 0 0 2 12s3.5 7 10 7a10.8 10.8 0 0 0 4.4-.9"></path>
								</svg>
							</span>
							<span class="password-toggle-icon" data-visible="true" aria-hidden="true" hidden>
								<svg viewBox="0 0 24 24" focusable="false">
									<path d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6S2 12 2 12Z"></path>
									<circle cx="12" cy="12" r="3"></circle>
								</svg>
							</span>
						</button>
					</div>
					<p class="field-error" id="passwordConfirmError"></p>
				</div>

				<button type="submit" class="primary-button" id="signupButton">회원가입</button>
			</form>

			<p class="auth-switch">
				이미 계정이 있나요?
				<a href="/login">로그인</a>
			</p>
		</div>
	</section>
</main>
<script th:src="@{/js/signup.js}"></script>
</body>
</html>
