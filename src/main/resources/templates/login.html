<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>로그인 | 공채왔어요</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800&display=swap" rel="stylesheet">
	<link rel="stylesheet" th:href="@{/css/auth.css}">
</head>
<body>
<header class="service-topbar">
	<a class="service-brand" href="/">
		<span class="brand-mark">G</span>
		<span>공채왔어요</span>
	</a>
	<nav class="service-topnav" aria-label="로그인 상단 메뉴">
		<a href="/recruitments">공고 목록</a>
	</nav>
</header>
<main class="auth-page login-page">
	<section class="auth-panel" aria-labelledby="login-title">
		<div class="auth-card">
			<div class="auth-heading">
				<p class="eyebrow">Welcome back</p>
				<h2 id="login-title">로그인</h2>
			</div>

			<div class="alert" id="loginMessage" role="alert" aria-live="polite" hidden></div>

			<form class="login-form" id="loginForm" method="post" action="/login" novalidate>
				<div class="field-group">
					<label for="email">아이디</label>
					<input
						type="text"
						id="email"
						name="username"
						autocomplete="email"
						required>
					<p class="field-error" id="emailError"></p>
				</div>

				<div class="field-group">
					<label for="password">비밀번호</label>
					<div class="password-field">
						<input
							type="password"
							id="password"
							name="password"
							autocomplete="current-password"
							required>
						<button
							type="button"
							class="text-button password-toggle"
							id="togglePassword"
							aria-label="비밀번호 표시"
							aria-pressed="false">
							<span class="password-toggle-icon" data-visible="false" aria-hidden="true">
								<svg viewBox="0 0 24 24" focusable="false">
									<path d="m3 3 18 18"></path>
									<path d="M10.7 5.2A10.7 10.7 0 0 1 12 5c6.5 0 10 7 10 7a18 18 0 0 1-3.2 4.1"></path>
									<path d="M14.1 14.1A3 3 0 0 1 9.9 9.9"></path>
									<path d="M6.6 6.6A18.2 18.2 0 0 0 2 12s3.5 7 10 7a10.8 10.8 0 0 0 4.4-.9"></path>
								</svg>
							</span>
							<span class="password-toggle-icon" data-visible="true" aria-hidden="true" hidden>
								<svg viewBox="0 0 24 24" focusable="false">
									<path d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6S2 12 2 12Z"></path>
									<circle cx="12" cy="12" r="3"></circle>
								</svg>
							</span>
						</button>
					</div>
					<p class="field-error" id="passwordError"></p>
				</div>

				<button type="submit" class="primary-button" id="loginButton">로그인</button>
			</form>

			<p class="auth-switch">
				아직 계정이 없나요?
				<a href="/signup">회원가입</a>
			</p>
			<p class="auth-switch">
				비밀번호 재설정이 필요하신가요?
				<a href="/reset-password">비밀번호 재설정</a>
			</p>
		</div>
	</section>
</main>
<script th:src="@{/js/login.js}"></script>
</body>
</html>
