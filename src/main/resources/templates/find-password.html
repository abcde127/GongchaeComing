<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>비밀번호 찾기 | 공채왔어요</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800&display=swap" rel="stylesheet">
	<link rel="stylesheet" th:href="@{/css/auth.css}">
</head>
<body>
<main class="auth-page">
	<section class="auth-visual" aria-label="비밀번호 재설정 안내">
		<a class="brand-mark" href="/recruitments" aria-label="공채왔어요 홈">G</a>
		<div class="visual-copy">
			<p class="eyebrow">Account recovery</p>
			<h1>비밀번호 재설정</h1>
			<p>가입 이메일로 받은 6자리 인증번호를 확인한 뒤 새 비밀번호로 변경하세요.</p>
		</div>
	</section>

	<section class="auth-panel" aria-labelledby="find-password-title">
		<div class="auth-card">
			<div class="auth-heading">
				<p class="eyebrow">Find password</p>
				<h2 id="find-password-title">비밀번호 찾기</h2>
				<p>인증번호는 5분 동안 유효합니다.</p>
			</div>

			<div class="alert" id="findPasswordMessage" role="alert" aria-live="polite" hidden></div>

			<form class="auth-form" id="findPasswordForm" novalidate>
				<div class="field-group">
					<label for="email">가입 이메일</label>
					<div class="input-action-row">
						<input
							type="email"
							id="email"
							name="email"
							autocomplete="email"
							required>
						<button type="button" class="secondary-button" id="requestCodeButton">인증번호</button>
					</div>
					<p class="field-error" id="emailError"></p>
				</div>

				<div class="field-group">
					<label for="code">인증번호</label>
					<div class="input-action-row">
						<input
							type="text"
							id="code"
							name="code"
							inputmode="numeric"
							autocomplete="one-time-code"
							maxlength="6"
							required>
						<button type="button" class="secondary-button" id="verifyCodeButton">확인</button>
					</div>
					<p class="field-error" id="codeError"></p>
				</div>

				<div class="field-group">
					<label for="newPassword">새 비밀번호</label>
					<div class="password-field">
						<input
							type="password"
							id="newPassword"
							name="newPassword"
							autocomplete="new-password"
							required>
						<button
							type="button"
							class="text-button password-toggle"
							id="toggleNewPassword"
							aria-label="비밀번호 표시"
							aria-pressed="false">
							<span class="password-toggle-icon" data-visible="false" aria-hidden="true">
								<svg viewBox="0 0 24 24" focusable="false">
									<path d="m3 3 18 18"></path>
									<path d="M10.7 5.2A10.7 10.7 0 0 1 12 5c6.5 0 10 7 10 7a18 18 0 0 1-3.2 4.1"></path>
									<path d="M14.1 14.1A3 3 0 0 1 9.9 9.9"></path>
									<path d="M6.6 6.6A18.2 18.2 0 0 0 2 12s3.5 7 10 7a10.8 10.8 0 0 0 4.4-.9"></path>
								</svg>
							</span>
							<span class="password-toggle-icon" data-visible="true" aria-hidden="true" hidden>
								<svg viewBox="0 0 24 24" focusable="false">
									<path d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6S2 12 2 12Z"></path>
									<circle cx="12" cy="12" r="3"></circle>
								</svg>
							</span>
						</button>
					</div>
					<p class="field-error" id="newPasswordError"></p>
				</div>

				<div class="field-group">
					<label for="newPasswordConfirm">새 비밀번호 확인</label>
					<input
						type="password"
						id="newPasswordConfirm"
						name="newPasswordConfirm"
						autocomplete="new-password"
						required>
					<p class="field-error" id="newPasswordConfirmError"></p>
				</div>

				<button type="submit" class="primary-button" id="resetPasswordButton">비밀번호 변경</button>
			</form>

			<p class="auth-switch">
				비밀번호가 기억났나요?
				<a href="/login">로그인</a>
			</p>
		</div>
	</section>
</main>
<script th:src="@{/js/find-password.js}"></script>
</body>
</html>
