<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>마이페이지 | Gongchae Coming</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800&display=swap" rel="stylesheet">
	<link rel="stylesheet" th:href="@{/css/auth.css}">
	<link rel="stylesheet" th:href="@{/css/mypage.css(v=5)}">
</head>
<body>
<div class="mypage-shell">
	<header class="mypage-topbar">
		<a class="mypage-brand" href="/recruitments">
			<span class="brand-mark">G</span>
			<span>Gongchae Coming</span>
		</a>
		<nav class="mypage-topnav" aria-label="마이페이지 상단 메뉴">
			<a href="/recruitments">채용 목록</a>
			<form method="post" action="/logout">
				<button type="submit">로그아웃</button>
			</form>
		</nav>
	</header>

	<main class="mypage-layout">
		<aside class="mypage-sidebar" aria-label="마이페이지 메뉴">
			<section class="sidebar-heading" aria-labelledby="mypage-title">
				<p class="eyebrow">My page</p>
				<h1 id="mypage-title">마이페이지</h1>
			</section>
			<div class="sidebar-divider" aria-hidden="true"></div>

			<nav class="mypage-menu" aria-label="마이페이지 섹션">
				<button type="button" class="mypage-menu-item is-active" data-section-target="profile" aria-current="page">
					<span class="menu-icon" aria-hidden="true">
						<svg viewBox="0 0 24 24"><path d="M20 21a8 8 0 0 0-16 0"></path><circle cx="12" cy="7" r="4"></circle></svg>
					</span>
					<span>회원정보</span>
				</button>
				<button type="button" class="mypage-menu-item" data-section-target="favorites">
					<span class="menu-icon" aria-hidden="true">
						<svg viewBox="0 0 24 24"><path d="M19 21l-7-4-7 4V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path></svg>
					</span>
					<span>관심공고</span>
				</button>
				<button type="button" class="mypage-menu-item" data-section-target="notifications">
					<span class="menu-icon" aria-hidden="true">
						<svg viewBox="0 0 24 24"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 7-3 9h18c0-2-3-2-3-9"></path><path d="M13.7 21a2 2 0 0 1-3.4 0"></path></svg>
					</span>
					<span>알림설정</span>
				</button>
			</nav>
		</aside>

		<section class="mypage-content" aria-label="마이페이지 내용">
			<section class="mypage-section is-active" id="section-profile" data-section="profile" aria-labelledby="profile-title">
				<div class="section-heading">
					<div>
						<p class="eyebrow">Member profile</p>
						<h2 id="profile-title">회원정보</h2>
					</div>
				</div>

				<div class="alert" id="mypageMessage" role="alert" aria-live="polite" hidden></div>

				<div class="profile-view" id="profileView">
					<div class="profile-overview">
						<div class="profile-side" aria-label="프로필 요약">
							<div class="profile-initial" id="profileInitial">G</div>
						</div>
						<div class="profile-view-grid" aria-label="회원 프로필">
							<div class="profile-field">
								<span>이메일</span>
								<strong id="profileEmailText">-</strong>
							</div>
							<div class="profile-field">
								<span>닉네임</span>
								<div class="nickname-display nickname-mode is-active" id="nicknameDisplay">
									<strong id="profileNicknameText">-</strong>
									<button type="button" class="icon-action-button" id="editNicknameButton" aria-label="닉네임 수정" title="닉네임 수정">
										<svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
											<path d="M12 20h9"></path>
											<path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"></path>
										</svg>
									</button>
								</div>
								<form class="nickname-edit-form nickname-mode" id="nicknameEditForm" novalidate>
									<input
										type="text"
										id="nicknameInput"
										name="nickname"
										autocomplete="nickname"
										minlength="2"
										maxlength="50"
										required>
									<button type="submit" class="nickname-save-button" id="saveNicknameButton" aria-label="닉네임 저장" title="저장">
										<svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
											<path d="M20 6 9 17l-5-5"></path>
										</svg>
									</button>
									<button type="button" class="nickname-cancel-button" id="cancelNicknameButton" aria-label="닉네임 수정 취소" title="취소">
										<svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
											<path d="M18 6 6 18"></path>
											<path d="m6 6 12 12"></path>
										</svg>
									</button>
								</form>
							</div>
							<div class="profile-field">
								<span>가입일</span>
								<strong id="profileCreatedAtText">-</strong>
							</div>
						</div>
					</div>
				</div>
			</section>

			<section class="mypage-section" id="section-favorites" data-section="favorites" aria-labelledby="favorites-title" hidden>
				<div class="section-heading">
					<div>
						<p class="eyebrow">Saved recruitments</p>
						<h2 id="favorites-title">관심공고</h2>
					</div>
				</div>
				<div class="empty-panel">
					<strong>저장된 공고가 없습니다.</strong>
					<a href="/recruitments">채용 목록 보기</a>
				</div>
			</section>

			<section class="mypage-section" id="section-notifications" data-section="notifications" aria-labelledby="notifications-title" hidden>
				<div class="section-heading">
					<div>
						<p class="eyebrow">Notifications</p>
						<h2 id="notifications-title">알림설정</h2>
					</div>
				</div>
				<div class="setting-list">
					<label class="setting-row">
						<span>
							<strong>마감 임박 알림</strong>
							<small>관심공고 마감 전 알림</small>
						</span>
						<input type="checkbox" disabled>
					</label>
					<label class="setting-row">
						<span>
							<strong>신규 공고 알림</strong>
							<small>저장한 조건과 맞는 공고 알림</small>
						</span>
						<input type="checkbox" disabled>
					</label>
				</div>
			</section>
		</section>
	</main>
</div>
<script th:src="@{/js/mypage.js}"></script>
</body>
</html>
