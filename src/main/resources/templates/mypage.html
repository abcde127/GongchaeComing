<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>마이페이지 | Gongchae Coming</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800&display=swap" rel="stylesheet">
	<link rel="stylesheet" th:href="@{/css/auth.css}">
	<link rel="stylesheet" th:href="@{/css/mypage.css(v=7)}">
</head>
<body>
<div class="mypage-shell">
	<header class="mypage-topbar">
		<a class="mypage-brand" href="/recruitments">
			<span class="brand-mark">G</span>
			<span>Gongchae Coming</span>
		</a>
		<nav class="mypage-topnav" aria-label="마이페이지 상단 메뉴">
			<a href="/recruitments">채용 목록</a>
			<form method="post" action="/logout">
				<button type="submit">로그아웃</button>
			</form>
		</nav>
	</header>

	<main class="mypage-layout">
		<aside class="mypage-sidebar" aria-label="마이페이지 메뉴">
			<section class="sidebar-heading" aria-labelledby="mypage-title">
				<p class="eyebrow">My page</p>
				<h1 id="mypage-title">마이페이지</h1>
			</section>
			<div class="sidebar-divider" aria-hidden="true"></div>

			<nav class="mypage-menu" aria-label="마이페이지 섹션">
				<button type="button" class="mypage-menu-item is-active" data-section-target="profile" aria-current="page">
					<span class="menu-icon" aria-hidden="true">
						<svg viewBox="0 0 24 24"><path d="M20 21a8 8 0 0 0-16 0"></path><circle cx="12" cy="7" r="4"></circle></svg>
					</span>
					<span>회원정보</span>
				</button>
				<button type="button" class="mypage-menu-item" data-section-target="password">
					<span class="menu-icon" aria-hidden="true">
						<svg viewBox="0 0 24 24"><rect x="5" y="11" width="14" height="10" rx="2"></rect><path d="M8 11V7a4 4 0 0 1 8 0v4"></path></svg>
					</span>
					<span>비밀번호 변경</span>
				</button>
				<button type="button" class="mypage-menu-item" data-section-target="favorites">
					<span class="menu-icon" aria-hidden="true">
						<svg viewBox="0 0 24 24"><path d="M19 21l-7-4-7 4V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path></svg>
					</span>
					<span>관심공고</span>
				</button>
				<button type="button" class="mypage-menu-item" data-section-target="notifications">
					<span class="menu-icon" aria-hidden="true">
						<svg viewBox="0 0 24 24"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 7-3 9h18c0-2-3-2-3-9"></path><path d="M13.7 21a2 2 0 0 1-3.4 0"></path></svg>
					</span>
					<span>알림설정</span>
				</button>
			</nav>
		</aside>

		<section class="mypage-content" aria-label="마이페이지 내용">
			<section class="mypage-section is-active" id="section-profile" data-section="profile" aria-labelledby="profile-title">
				<div class="section-heading">
					<div>
						<p class="eyebrow">Member profile</p>
						<h2 id="profile-title">회원정보</h2>
					</div>
				</div>

				<div class="alert" id="mypageMessage" role="alert" aria-live="polite" hidden></div>

				<div class="profile-view" id="profileView">
					<div class="profile-overview">
						<div class="profile-side" aria-label="프로필 요약">
							<div class="profile-initial" id="profileInitial">G</div>
						</div>
						<div class="profile-view-grid" aria-label="회원 프로필">
							<div class="profile-field">
								<span>이메일</span>
								<strong id="profileEmailText">-</strong>
							</div>
							<div class="profile-field">
								<span>닉네임</span>
								<div class="nickname-display nickname-mode is-active" id="nicknameDisplay">
									<strong id="profileNicknameText">-</strong>
									<button type="button" class="icon-action-button" id="editNicknameButton" aria-label="닉네임 수정" title="닉네임 수정">
										<svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
											<path d="M12 20h9"></path>
											<path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"></path>
										</svg>
									</button>
								</div>
								<form class="nickname-edit-form nickname-mode" id="nicknameEditForm" novalidate>
									<input
										type="text"
										id="nicknameInput"
										name="nickname"
										autocomplete="nickname"
										minlength="2"
										maxlength="50"
										required>
									<button type="submit" class="nickname-save-button" id="saveNicknameButton" aria-label="닉네임 저장" title="저장">
										<svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
											<path d="M20 6 9 17l-5-5"></path>
										</svg>
									</button>
									<button type="button" class="nickname-cancel-button" id="cancelNicknameButton" aria-label="닉네임 수정 취소" title="취소">
										<svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
											<path d="M18 6 6 18"></path>
											<path d="m6 6 12 12"></path>
										</svg>
									</button>
								</form>
							</div>
							<div class="profile-field">
								<span>가입일</span>
								<strong id="profileCreatedAtText">-</strong>
							</div>
						</div>
					</div>
				</div>
			</section>

			<section class="mypage-section" id="section-password" data-section="password" aria-labelledby="password-title" hidden>
				<div class="section-heading">
					<div>
						<p class="eyebrow">Password</p>
						<h2 id="password-title">비밀번호 변경</h2>
					</div>
				</div>

				<div class="alert" id="passwordMessage" role="alert" aria-live="polite" hidden></div>

				<form class="auth-form password-change-form" id="passwordChangeForm" novalidate>
					<div class="field-group">
						<label for="currentPassword">현재 비밀번호</label>
						<div class="password-field">
							<input
								type="password"
								id="currentPassword"
								name="currentPassword"
								autocomplete="current-password"
								aria-describedby="currentPasswordError"
								required>
							<button
								type="button"
								class="text-button password-toggle"
								data-password-toggle="currentPassword"
								aria-label="현재 비밀번호 표시"
								aria-pressed="false">
								<span class="password-toggle-icon" data-visible="false" aria-hidden="true">
									<svg viewBox="0 0 24 24" focusable="false">
										<path d="m3 3 18 18"></path>
										<path d="M10.7 5.2A10.7 10.7 0 0 1 12 5c6.5 0 10 7 10 7a18 18 0 0 1-3.2 4.1"></path>
										<path d="M14.1 14.1A3 3 0 0 1 9.9 9.9"></path>
										<path d="M6.6 6.6A18.2 18.2 0 0 0 2 12s3.5 7 10 7a10.8 10.8 0 0 0 4.4-.9"></path>
									</svg>
								</span>
								<span class="password-toggle-icon" data-visible="true" aria-hidden="true" hidden>
									<svg viewBox="0 0 24 24" focusable="false">
										<path d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6S2 12 2 12Z"></path>
										<circle cx="12" cy="12" r="3"></circle>
									</svg>
								</span>
							</button>
						</div>
						<p class="field-error" id="currentPasswordError" hidden></p>
					</div>

					<div class="field-group">
						<label for="newPassword">새 비밀번호</label>
						<div class="password-field">
							<input
								type="password"
								id="newPassword"
								name="newPassword"
								autocomplete="new-password"
								placeholder="영문과 숫자 포함 8자 이상"
								minlength="8"
								maxlength="64"
								aria-describedby="newPasswordError"
								required>
							<button
								type="button"
								class="text-button password-toggle"
								data-password-toggle="newPassword"
								aria-label="새 비밀번호 표시"
								aria-pressed="false">
								<span class="password-toggle-icon" data-visible="false" aria-hidden="true">
									<svg viewBox="0 0 24 24" focusable="false">
										<path d="m3 3 18 18"></path>
										<path d="M10.7 5.2A10.7 10.7 0 0 1 12 5c6.5 0 10 7 10 7a18 18 0 0 1-3.2 4.1"></path>
										<path d="M14.1 14.1A3 3 0 0 1 9.9 9.9"></path>
										<path d="M6.6 6.6A18.2 18.2 0 0 0 2 12s3.5 7 10 7a10.8 10.8 0 0 0 4.4-.9"></path>
									</svg>
								</span>
								<span class="password-toggle-icon" data-visible="true" aria-hidden="true" hidden>
									<svg viewBox="0 0 24 24" focusable="false">
										<path d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6S2 12 2 12Z"></path>
										<circle cx="12" cy="12" r="3"></circle>
									</svg>
								</span>
							</button>
						</div>
						<p class="field-error" id="newPasswordError" hidden></p>
					</div>

					<div class="field-group">
						<label for="newPasswordConfirm">새 비밀번호 확인</label>
						<div class="password-field">
							<input
								type="password"
								id="newPasswordConfirm"
								name="newPasswordConfirm"
								autocomplete="new-password"
								placeholder="영문과 숫자 포함 8자 이상"
								aria-describedby="newPasswordConfirmError"
								required>
							<button
								type="button"
								class="text-button password-toggle"
								data-password-toggle="newPasswordConfirm"
								aria-label="새 비밀번호 확인 표시"
								aria-pressed="false">
								<span class="password-toggle-icon" data-visible="false" aria-hidden="true">
									<svg viewBox="0 0 24 24" focusable="false">
										<path d="m3 3 18 18"></path>
										<path d="M10.7 5.2A10.7 10.7 0 0 1 12 5c6.5 0 10 7 10 7a18 18 0 0 1-3.2 4.1"></path>
										<path d="M14.1 14.1A3 3 0 0 1 9.9 9.9"></path>
										<path d="M6.6 6.6A18.2 18.2 0 0 0 2 12s3.5 7 10 7a10.8 10.8 0 0 0 4.4-.9"></path>
									</svg>
								</span>
								<span class="password-toggle-icon" data-visible="true" aria-hidden="true" hidden>
									<svg viewBox="0 0 24 24" focusable="false">
										<path d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6S2 12 2 12Z"></path>
										<circle cx="12" cy="12" r="3"></circle>
									</svg>
								</span>
							</button>
						</div>
						<p class="field-error" id="newPasswordConfirmError" hidden></p>
					</div>

					<button type="submit" class="primary-button" id="passwordSaveButton">비밀번호 변경</button>
				</form>
			</section>

			<section class="mypage-section" id="section-favorites" data-section="favorites" aria-labelledby="favorites-title" hidden>
				<div class="section-heading">
					<div>
						<p class="eyebrow">Saved recruitments</p>
						<h2 id="favorites-title">관심공고</h2>
					</div>
				</div>
				<div class="empty-panel">
					<strong>저장된 공고가 없습니다.</strong>
					<a href="/recruitments">채용 목록 보기</a>
				</div>
			</section>

			<section class="mypage-section" id="section-notifications" data-section="notifications" aria-labelledby="notifications-title" hidden>
				<div class="section-heading">
					<div>
						<p class="eyebrow">Notifications</p>
						<h2 id="notifications-title">알림설정</h2>
					</div>
				</div>
				<div class="setting-list">
					<label class="setting-row">
						<span>
							<strong>마감 임박 알림</strong>
							<small>관심공고 마감 전 알림</small>
						</span>
						<input type="checkbox" disabled>
					</label>
					<label class="setting-row">
						<span>
							<strong>신규 공고 알림</strong>
							<small>저장한 조건과 맞는 공고 알림</small>
						</span>
						<input type="checkbox" disabled>
					</label>
				</div>
			</section>
		</section>
	</main>
</div>
<script th:src="@{/js/mypage.js}"></script>
</body>
</html>
